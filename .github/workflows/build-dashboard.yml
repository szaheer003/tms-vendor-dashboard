# Build the static dashboard in GitHub (Node + Python). No local install required to produce out/**.
#
# Outputs:
#   - Artifact "dashboard-static-out" (zip of out/) — download from the Actions run summary.
#   - Optionally deploys to GitHub Pages when ENABLE_PAGES == 'true' (repo variable).
#
# Setup:
#   1. Push this workflow + commit public/data/*.json (or commit Folder 1-4 so extract can run in CI).
#   2. Settings → Actions → General → allow workflows to run.
#   3. For Pages: Settings → Pages → Source: GitHub Actions.
#      Settings → Secrets and variables → Actions → Variables → New: ENABLE_PAGES = true (string).
#
# Extract step: fails gracefully if vendor workbooks are not in the repo; build then uses committed public/data.

name: Build dashboard (static export)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dashboard-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Extract workbooks (optional)
        run: python scripts/extract_tms.py
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Static export
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_PAGES: ${{ vars.ENABLE_PAGES }}
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dashboard-static-out
          path: out
          retention-days: 30

      - uses: actions/upload-pages-artifact@v3
        if: vars.ENABLE_PAGES == 'true'
        with:
          path: out

  deploy_pages:
    needs: build
    if: vars.ENABLE_PAGES == 'true' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
